<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks Kanban Board</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>📋 Kanban Board</h1>
    <div class="header-actions">
      <button id="btnAddTask">+ Neuer Task</button>
      <button id="btnMetrics">📊 Metriken</button>
    </div>
  </header>

  <!-- METRIKEN LEISTE -->
  <div id="metricsBar" class="metrics-bar hidden">
    <div class="metric-card">
      <span class="metric-label">Ø Cycle Time</span>
      <span class="metric-value" id="metCycleTime">–</span>
      <span class="metric-unit">Stunden</span>
    </div>
    <div class="metric-card">
      <span class="metric-label">Ø Lead Time</span>
      <span class="metric-value" id="metLeadTime">–</span>
      <span class="metric-unit">Stunden</span>
    </div>
    <div class="metric-card">
      <span class="metric-label">Throughput</span>
      <span class="metric-value" id="metThroughput">–</span>
      <span class="metric-unit">Tasks erledigt</span>
    </div>
    <div class="metric-card" id="wipCard">
      <span class="metric-label">WIP (In Progress)</span>
      <span class="metric-value" id="metWip">–</span>
      <span class="metric-unit">aktive Tasks</span>
    </div>
  </div>

  <!-- BOARD -->
  <main class="board">
    <div class="column" data-status="backlog">
      <div class="column-header">
        <h2>Backlog</h2>
        <span class="count" id="count-backlog">0</span>
      </div>
      <div class="task-list" id="col-backlog"></div>
    </div>

    <div class="column" data-status="todo">
      <div class="column-header">
        <h2>To Do</h2>
        <span class="count" id="count-todo">0</span>
      </div>
      <div class="task-list" id="col-todo"></div>
    </div>

    <div class="column" data-status="in_progress">
      <div class="column-header">
        <h2>In Progress</h2>
        <span class="count" id="count-in_progress">0</span>
      </div>
      <div class="task-list" id="col-in_progress"></div>
    </div>

    <div class="column" data-status="review">
      <div class="column-header">
        <h2>Review</h2>
        <span class="count" id="count-review">0</span>
      </div>
      <div class="task-list" id="col-review"></div>
    </div>

    <div class="column" data-status="done">
      <div class="column-header">
        <h2>Done</h2>
        <span class="count" id="count-done">0</span>
      </div>
      <div class="task-list" id="col-done"></div>
    </div>
  </main>

  <!-- MODAL: Task erstellen / bearbeiten -->
  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <h2 id="modalTitle">Neuer Task</h2>
      <label>Titel *</label>
      <input type="text" id="inputTitle" placeholder="z.B. Login-Seite bauen" maxlength="100" />

      <label>Beschreibung</label>
      <textarea id="inputDesc" placeholder="Optional..." rows="3"></textarea>

      <label>Priorität</label>
      <select id="inputPriority">
        <option value="low">🟢 Low</option>
        <option value="medium" selected>🟡 Medium</option>
        <option value="high">🔴 High</option>
      </select>

      <div class="modal-actions">
        <button id="btnCancel" class="btn-secondary">Abbrechen</button>
        <button id="btnSave" class="btn-primary">Speichern</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Task Details / Status wechseln -->
  <div id="detailModal" class="modal hidden">
    <div class="modal-box">
      <h2 id="detailTitle"></h2>
      <p id="detailDesc" class="detail-desc"></p>
      <div class="detail-meta">
        <span>Priorität: <strong id="detailPriority"></strong></span>
        <span>Status: <strong id="detailStatus"></strong></span>
      </div>
      <label>Status wechseln:</label>
      <div id="transitionBtns" class="transition-btns"></div>
      <div class="modal-actions">
        <button id="btnDeleteTask" class="btn-danger">🗑 Löschen</button>
        <button id="btnCloseDetail" class="btn-secondary">Schließen</button>
        <button id="btnEditTask" class="btn-primary">✏️ Bearbeiten</button>
      </div>
    </div>
  </div>

  <!-- Toast Benachrichtigung -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
